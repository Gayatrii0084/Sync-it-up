<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages – SyncItUp</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body style="overflow:hidden">

  <nav class="navbar">
    <a class="nav-logo" href="/">Sync<span class="logo-dot">It</span>Up</a>
    <div class="nav-toggle"><span></span><span></span><span></span></div>
    <div class="nav-links">
      <a href="/pages/dashboard.html">Dashboard</a>
      <a href="/pages/match.html">Find Teammates</a>
      <a href="/pages/chat.html" class="active">Messages</a>
      <a href="/pages/profile.html">Profile</a>
    </div>
    <div class="nav-actions">
      <div class="nav-avatar" id="navAvatar" onclick="window.location='/pages/profile.html'">?</div>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="chat-layout">
    <!-- SIDEBAR -->
    <div class="chat-sidebar" id="chatSidebar">
      <div class="chat-sidebar-header">
        💬 Messages
        <button id="sidebarToggle" class="btn btn-secondary btn-sm" style="display:none">☰</button>
      </div>
      <div id="conversationList">
        <div class="loading-overlay">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <!-- MAIN CHAT AREA -->
    <div class="chat-main" id="chatMainArea">
      <!-- Empty state -->
      <div id="chatEmpty" class="flex-center" style="flex:1;flex-direction:column;gap:1rem;color:var(--text-muted)">
        <div style="font-size:4rem">💬</div>
        <div style="font-weight:600;font-size:1.1rem;color:var(--text-secondary)">Select a conversation</div>
        <p style="font-size:0.88rem;text-align:center;max-width:280px">Choose a contact from the sidebar or <a
            href="/pages/match.html" style="color:var(--primary)">find a teammate</a> to start chatting.</p>
      </div>

      <!-- Chat header -->
      <div class="chat-header" id="chatHeader" style="display:none">
        <div style="display:flex;align-items:center;gap:0.9rem">
          <button class="btn btn-secondary btn-sm" id="sidebarToggle2" style="display:none">☰</button>
          <div class="student-avatar" id="chatHeaderAvatar" style="width:42px;height:42px;font-size:0.9rem">?</div>
          <div>
            <div style="font-weight:700" id="chatHeaderName">—</div>
            <div style="font-size:0.78rem;color:var(--text-muted)">Connected teammate</div>
          </div>
        </div>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="chatMessages" style="display:none"></div>

      <!-- Input -->
      <div class="chat-input-area" id="chatInputArea" style="display:none">
        <form id="chatForm" style="flex:1;display:flex;gap:0.75rem">

          <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." autocomplete="off" />

          <button type="button" onclick="sendMessage()" class="btn btn-primary"
            style="border-radius:50%;width:46px;height:46px;padding:0;flex-shrink:0">

            ➤

          </button>

        </form>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/config.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/chat.js"></script>
  <script>
    // Override openConversation to show chat areas
    const _orig = openConversation;
    openConversation = async function (partnerId) {
      document.getElementById('chatEmpty').style.display = 'none';
      document.getElementById('chatHeader').style.display = 'flex';
      document.getElementById('chatMessages').style.display = 'flex';
      document.getElementById('chatInputArea').style.display = 'flex';
      await _orig(partnerId);
    };
  </script>
</body>

</html>
