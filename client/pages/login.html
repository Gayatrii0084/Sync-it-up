<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – SyncItUp</title>
  <meta name="description" content="Sign in to SyncItUp to find your hackathon teammate."/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-container">
  <!-- LEFT PANEL -->
  <div class="auth-left">
    <div class="auth-brand">SyncItUp</div>
    <div class="auth-brand-sub">Find Your Perfect Hackathon Teammate</div>
    <div class="auth-feature-list">
      <div class="auth-feature">
        <div class="auth-feature-icon">🔍</div>
        <div class="auth-feature-text">Smart skill-based matching</div>
      </div>
      <div class="auth-feature">
        <div class="auth-feature-icon">💬</div>
        <div class="auth-feature-text">Secure real-time messaging</div>
      </div>
      <div class="auth-feature">
        <div class="auth-feature-icon">🏫</div>
        <div class="auth-feature-text">Connect within your college</div>
      </div>
      <div class="auth-feature">
        <div class="auth-feature-icon">🛡️</div>
        <div class="auth-feature-text">OTP-verified secure accounts</div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="auth-right">
    <div class="auth-form-box">
      <a href="/" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem;font-weight:500">← Back to Home</a>
      <h1 class="auth-title">Welcome back 👋</h1>
      <p class="auth-subtitle">Sign in to your SyncItUp account.</p>

      <div id="loginAlert" class="alert d-none"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email"/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔑</span>
            <input class="form-input" type="password" id="loginPassword" placeholder="Your password" required autocomplete="current-password"/>
            <span class="input-eye" id="eye1" onclick="togglePassword('loginPassword','eye1')">👁️</span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn" style="margin-top:0.5rem">Sign In</button>
      </form>

      <hr class="divider"/>
      <p class="text-center text-muted" style="font-size:0.9rem">
        Don't have an account?
        <a href="/pages/signup.html" style="color:var(--primary);font-weight:600">Sign up here</a>
      </p>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
