<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile – SyncItUp</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a class="nav-logo" href="/">Sync<span>It</span>Up</a>
  <div class="nav-toggle"><span></span><span></span><span></span></div>
  <div class="nav-links">
    <a href="/pages/dashboard.html">Dashboard</a>
    <a href="/pages/match.html">Find Teammates</a>
    <a href="/pages/chat.html">Messages</a>
    <a href="/pages/profile.html" class="active">Profile</a>
  </div>
  <div class="nav-actions">
    <div class="nav-avatar" id="navAvatar">?</div>
    <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="profile-hero">
  <div class="container text-center">
    <div class="profile-avatar-large" id="profileAvatar">?</div>
    <h1 id="profileName" style="font-size:1.5rem;font-weight:800;margin-bottom:4px">Loading...</h1>
    <p id="profileCollege" style="opacity:0.75;font-size:0.875rem"></p>
  </div>
</div>

<div class="container profile-card-offset" style="padding-bottom:3rem">
  <div class="grid-2" style="gap:1.5rem;align-items:start">

    <!-- Profile Card -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Profile Details</span>
        <button class="btn btn-outline btn-sm" onclick="toggleEdit()">Edit Profile</button>
      </div>

      <!-- View Mode -->
      <div id="viewMode">
        <dl style="display:flex;flex-direction:column;gap:1.1rem">
          <div><dt class="form-label" style="margin-bottom:4px">Email</dt><dd id="viewEmail" style="color:var(--text-primary);font-size:0.875rem">—</dd></div>
          <div><dt class="form-label" style="margin-bottom:4px">College</dt><dd id="viewCollege" style="font-size:0.875rem">—</dd></div>
          <div><dt class="form-label" style="margin-bottom:6px">Availability</dt><dd id="viewAvailability">—</dd></div>
          <div><dt class="form-label" style="margin-bottom:6px">Skills</dt><dd class="tags" id="viewSkills">—</dd></div>
          <div><dt class="form-label" style="margin-bottom:6px">Interests</dt><dd class="tags" id="viewInterests">—</dd></div>
          <div><dt class="form-label" style="margin-bottom:4px">Bio</dt><dd id="viewBio" style="color:var(--text-secondary);font-size:0.875rem;line-height:1.65">—</dd></div>
          <div><dt class="form-label" style="margin-bottom:4px">Member Since</dt><dd id="viewJoined" style="color:var(--text-muted);font-size:0.82rem">—</dd></div>
        </dl>
      </div>

      <!-- Edit Mode -->
      <div id="editMode" class="d-none">
        <div id="profileAlert" class="alert d-none"></div>
        <form id="profileForm">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-input" type="text" id="editName" required/>
          </div>
          <div class="form-group">
            <label class="form-label">College / University</label>
            <input class="form-input" type="text" id="editCollege" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Skills <span class="form-hint">(comma-separated)</span></label>
            <input class="form-input" type="text" id="editSkills" placeholder="Frontend, Backend, AI..."/>
          </div>
          <div class="form-group">
            <label class="form-label">Interests <span class="form-hint">(comma-separated)</span></label>
            <input class="form-input" type="text" id="editInterests" placeholder="Hackathons, Open Source..."/>
          </div>
          <div class="form-group">
            <label class="form-label">Availability</label>
            <select class="form-select" id="editAvailability">
              <option value="full-time">Full Time</option>
              <option value="part-time">Part Time</option>
              <option value="weekends">Weekends</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Bio</label>
            <textarea class="form-textarea" id="editBio" placeholder="Tell others about yourself..."></textarea>
          </div>
          <div style="display:flex;gap:0.65rem">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <button type="button" class="btn btn-secondary" onclick="toggleEdit()">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Sidebar -->
    <div style="display:flex;flex-direction:column;gap:1.25rem">
      <div class="card" style="padding:1.25rem">
        <div class="card-title" style="margin-bottom:0.9rem">Quick Actions</div>
        <div style="display:flex;flex-direction:column;gap:0.5rem">
          <a href="/pages/match.html" class="btn btn-primary btn-block">Find Teammates</a>
          <a href="/pages/chat.html" class="btn btn-outline btn-block">Messages</a>
          <a href="/pages/dashboard.html" class="btn btn-secondary btn-block">Dashboard</a>
        </div>
      </div>
      <div class="card" style="padding:1.25rem">
        <div class="card-title" style="margin-bottom:0.75rem">Popular Skills</div>
        <div class="tags" style="gap:6px">
          <span class="tag tag-primary">Frontend</span><span class="tag tag-primary">Backend</span>
          <span class="tag tag-primary">AI</span><span class="tag tag-primary">ML</span>
          <span class="tag tag-primary">IoT</span><span class="tag tag-primary">UI UX</span>
          <span class="tag tag-primary">Mobile</span><span class="tag tag-primary">Cloud</span>
          <span class="tag tag-primary">DevOps</span><span class="tag tag-primary">Cybersecurity</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const user = await requireAuth('student');
  if (!user) return;
  populateNavUser(user);
  await loadProfile();
});

async function loadProfile() {
  const res = await apiRequest('/api/auth/profile');
  if (!res.success) { showToast('Failed to load profile', 'error'); return; }
  const u = res.user;
  document.getElementById('profileAvatar').textContent = getInitials(u.name);
  document.getElementById('profileName').textContent   = u.name;
  document.getElementById('profileCollege').textContent = u.college_name;
  document.getElementById('navAvatar').textContent     = getInitials(u.name);
  document.getElementById('viewEmail').textContent     = u.email;
  document.getElementById('viewCollege').textContent   = u.college_name;
  document.getElementById('viewAvailability').innerHTML = renderAvailability(u.availability);
  document.getElementById('viewSkills').innerHTML      = renderSkillTags(u.skills, 10);
  document.getElementById('viewInterests').innerHTML   = renderInterestTags(u.interests, 10);
  document.getElementById('viewBio').textContent       = u.bio || 'No bio yet.';
  document.getElementById('viewJoined').textContent    = 'Joined ' + formatDate(u.created_at);
  document.getElementById('editName').value       = u.name;
  document.getElementById('editCollege').value    = u.college_name;
  document.getElementById('editSkills').value     = u.skills || '';
  document.getElementById('editInterests').value  = u.interests || '';
  document.getElementById('editAvailability').value = u.availability || 'full-time';
  document.getElementById('editBio').value        = u.bio || '';
}

function toggleEdit() {
  document.getElementById('viewMode').classList.toggle('d-none');
  document.getElementById('editMode').classList.toggle('d-none');
}

document.getElementById('profileForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const alertEl = document.getElementById('profileAlert');
  const btn = e.target.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  const res = await apiRequest('/api/auth/profile', { method: 'PUT', body: JSON.stringify({
    name: document.getElementById('editName').value.trim(),
    college_name: document.getElementById('editCollege').value.trim(),
    skills: document.getElementById('editSkills').value.trim(),
    interests: document.getElementById('editInterests').value.trim(),
    availability: document.getElementById('editAvailability').value,
    bio: document.getElementById('editBio').value.trim()
  })});
  if (res.success) { showToast('Profile updated!', 'success'); toggleEdit(); await loadProfile(); }
  else { alertEl.className='alert alert-error'; alertEl.textContent=res.message; alertEl.classList.remove('d-none'); }
  btn.disabled = false; btn.textContent = 'Save Changes';
});
</script>
</body>
</html>
