<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Find Teammates – SyncItUp</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a class="nav-logo" href="/">Sync<span>It</span>Up</a>
  <div class="nav-toggle"><span></span><span></span><span></span></div>
  <div class="nav-links">
    <a href="/pages/dashboard.html">Dashboard</a>
    <a href="/pages/match.html" class="active">Find Teammates</a>
    <a href="/pages/chat.html">Messages</a>
    <a href="/pages/profile.html">Profile</a>
  </div>
  <div class="nav-actions">
    <div class="nav-avatar" id="navAvatar" onclick="window.location='/pages/profile.html'">?</div>
    <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<main style="padding:1.5rem 0 3rem">
  <div class="container">
    <div class="page-header" style="padding-top:1rem">
      <h1 class="page-title">Find Teammates</h1>
      <p class="page-subtitle">Discover students from your college — filter by skills, interests, and availability.</p>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <div class="form-group">
        <label class="form-label">Skills</label>
        <input class="form-input" type="text" id="filterSkills" placeholder="e.g. Frontend, AI, ML"/>
      </div>
      <div class="form-group">
        <label class="form-label">Interests</label>
        <input class="form-input" type="text" id="filterInterests" placeholder="e.g. Hackathons"/>
      </div>
      <div class="form-group">
        <label class="form-label">Availability</label>
        <select class="form-select" id="filterAvailability">
          <option value="">Any</option>
          <option value="full-time">Full Time</option>
          <option value="part-time">Part Time</option>
          <option value="weekends">Weekends</option>
        </select>
      </div>
      <div class="search-actions">
        <button class="btn btn-primary" onclick="searchStudents()">Search</button>
        <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <!-- Results Count -->
    <div id="resultsCount" style="margin-bottom:1rem;font-size:0.82rem;color:var(--text-muted);font-weight:500"></div>

    <!-- Results -->
    <div id="searchResults">
      <div class="loading-overlay"><div class="spinner"></div><span>Loading students...</span></div>
    </div>
  </div>
</main>

<!-- Report Modal -->
<div class="modal-overlay" id="reportModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Report User</span>
      <button class="modal-close" onclick="closeModal('reportModal')">&#x2715;</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-muted);font-size:0.875rem;margin-bottom:1rem">
        Reporting <strong id="reportTargetName"></strong>. Select a reason:
      </p>
      <div class="reason-options">
        <label class="reason-option"><input type="radio" name="reportReason" value="Harassment"/> Harassment</label>
        <label class="reason-option"><input type="radio" name="reportReason" value="Inappropriate content"/> Inappropriate Content</label>
        <label class="reason-option"><input type="radio" name="reportReason" value="Spam"/> Spam</label>
        <label class="reason-option"><input type="radio" name="reportReason" value="Fake profile"/> Fake Profile</label>
        <label class="reason-option"><input type="radio" name="reportReason" value="Other"/> Other</label>
      </div>
      <div class="form-group">
        <label class="form-label">Additional Details (optional)</label>
        <textarea class="form-textarea" id="reportDetails" placeholder="Describe the issue..." rows="3"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('reportModal')">Cancel</button>
      <button class="btn btn-danger" onclick="submitReport()">Submit Report</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/config.js"></script><script src="/js/app.js"></script>
<script>
let currentReportUserId = null;

document.addEventListener('DOMContentLoaded', async () => {
  const user = await requireAuth('student');
  if (!user) return;
  populateNavUser(user);
  searchStudents();
});

async function searchStudents() {
  const skills       = document.getElementById('filterSkills').value.trim();
  const interests    = document.getElementById('filterInterests').value.trim();
  const availability = document.getElementById('filterAvailability').value;

  const params = new URLSearchParams();
  if (skills) params.set('skills', skills);
  if (interests) params.set('interests', interests);
  if (availability) params.set('availability', availability);

  const resultsEl = document.getElementById('searchResults');
  const countEl   = document.getElementById('resultsCount');
  resultsEl.innerHTML = `<div class="loading-overlay"><div class="spinner"></div><span>Searching...</span></div>`;
  countEl.textContent = '';

  const [searchRes, outReqRes, connRes] = await Promise.all([
    apiRequest(`/api/match/search?${params}`),
    apiRequest('/api/match/requests/outgoing'),
    apiRequest('/api/match/connections'),
  ]);

  if (!searchRes.success) {
    resultsEl.innerHTML = `<div class="alert alert-error">${searchRes.message}</div>`;
    return;
  }

  const students = searchRes.students || [];
  // Build sets from string IDs for comparison
  const sentIds = new Set((outReqRes.requests || []).map(r => String(r.receiver_id)));
  const connIds = new Set((connRes.connections || []).map(c => String(c._id)));

  countEl.textContent = students.length
    ? `${students.length} student${students.length !== 1 ? 's' : ''} found`
    : '';

  if (!students.length) {
    resultsEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">&#128270;</div>
        <div class="empty-state-title">No students found</div>
        <p style="font-size:0.84rem;color:var(--text-muted)">Try different filters or broaden your search.</p>
      </div>`;
    return;
  }

  resultsEl.innerHTML = `<div class="cards-grid">${students.map(s => buildCard(s, sentIds, connIds)).join('')}</div>`;
}

function buildCard(s, sentIds, connIds) {
  const sid = String(s._id);
  const isConnected = connIds.has(sid);
  const isSent      = sentIds.has(sid);

  let connectBtn = '';
  if (isConnected) {
    connectBtn = `<a href="/pages/chat.html?partner=${sid}" class="btn btn-success btn-sm">Message</a>`;
  } else if (isSent) {
    connectBtn = `<button class="btn btn-secondary btn-sm" disabled>Request Sent</button>`;
  } else {
    connectBtn = `<button class="btn btn-primary btn-sm" data-user-id="${sid}" onclick="sendRequest('${sid}', this)">Connect</button>`;
  }

  return `
    <div class="user-card">
      <!-- HEADER -->
      <div class="user-card-header">
        <div class="user-card-avatar">${getInitials(s.name)}</div>
        <div style="min-width:0">
          <div class="user-card-name">${s.name}</div>
          <div class="user-card-college">${s.college_name}</div>
        </div>
      </div>

      <!-- BODY -->
      <div class="user-card-body">
        <!-- Skills -->
        <div>
          <div class="card-section-label">Skills</div>
          <div class="tags">${renderSkillTags(s.skills, 5)}</div>
        </div>

        <!-- Interests -->
        <div>
          <div class="card-section-label">Interests</div>
          <div class="tags">${renderInterestTags(s.interests, 3)}</div>
        </div>

        <!-- Availability -->
        <div>
          <div class="card-section-label">Availability</div>
          ${renderAvailability(s.availability)}
        </div>
      </div>

      <!-- FOOTER -->
      <div class="user-card-footer">
        <button class="btn btn-danger-outline btn-sm" onclick="openReportModal('${sid}', '${s.name.replace(/'/g, "\\'")}')">Report</button>
        ${connectBtn}
      </div>
    </div>`;
}

function clearFilters() {
  document.getElementById('filterSkills').value     = '';
  document.getElementById('filterInterests').value  = '';
  document.getElementById('filterAvailability').value = '';
  searchStudents();
}

async function sendRequest(receiverId, btn) {
  btn.disabled = true;
  btn.textContent = 'Sending...';

  const res = await apiRequest('/api/match/request', {
    method: 'POST',
    body: JSON.stringify({ receiver_id: receiverId })
  });

  showToast(res.message, res.success ? 'success' : 'error');
  if (res.success) {
    btn.textContent = 'Request Sent';
    btn.classList.replace('btn-primary', 'btn-secondary');
  } else {
    btn.disabled = false;
    btn.textContent = 'Connect';
  }
}

function openReportModal(userId, userName) {
  currentReportUserId = userId;
  document.getElementById('reportTargetName').textContent = userName;
  document.querySelectorAll('input[name="reportReason"]').forEach(r => r.checked = false);
  document.getElementById('reportDetails').value = '';
  document.getElementById('reportModal').classList.add('active');
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

async function submitReport() {
  const reason  = document.querySelector('input[name="reportReason"]:checked')?.value;
  const details = document.getElementById('reportDetails').value.trim();
  if (!reason) { showToast('Please select a reason', 'warning'); return; }

  const res = await apiRequest('/api/match/report', {
    method: 'POST',
    body: JSON.stringify({ reported_user_id: currentReportUserId, reason: `${reason}${details ? ': ' + details : ''}` })
  });
  showToast(res.message, res.success ? 'success' : 'error');
  if (res.success) closeModal('reportModal');
}

document.getElementById('reportModal').addEventListener('click', e => {
  if (e.target === document.getElementById('reportModal')) closeModal('reportModal');
});
</script>
</body>
</html>
