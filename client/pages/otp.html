<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify OTP – SyncItUp</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body style="background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem">

<div class="card" style="max-width:460px;width:100%;border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:2.5rem">
  <div style="text-align:center;margin-bottom:2rem">
    <div style="width:72px;height:72px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1rem">🔐</div>
    <h1 style="font-size:1.6rem;font-weight:800;color:var(--text-primary);margin-bottom:0.4rem">Verify Your Email</h1>
    <p style="color:var(--text-muted);font-size:0.9rem">
      We've sent a 6-digit OTP to<br/>
      <strong id="otpEmail" style="color:var(--primary)">your email</strong>
    </p>
  </div>

  <div id="otpAlert" class="alert d-none"></div>

  <form id="otpForm" novalidate>
    <div class="otp-inputs">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp0" autocomplete="off"/>
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp1" autocomplete="off"/>
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp2" autocomplete="off"/>
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp3" autocomplete="off"/>
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp4" autocomplete="off"/>
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp5" autocomplete="off"/>
    </div>

    <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-bottom:1rem">✅ Verify OTP</button>
  </form>

  <div style="text-align:center">
    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:0.75rem">Didn't receive the OTP?</p>
    <button class="btn btn-outline" id="resendOtp">Resend OTP</button>
  </div>

  <hr class="divider"/>
  <p class="text-center" style="font-size:0.83rem;color:var(--text-muted)">
    <a href="/pages/signup.html" style="color:var(--primary)">← Go back to Sign Up</a>
  </p>
</div>

<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
